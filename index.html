<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELCOME BY RORAXBALI</title>
    <!-- Mengambil font bergaya teknologi/cyber modern dari Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Gambar latar belakang sikit teknologi gelap premium dengan lapisan gradasi hitam solid */
            background: linear-gradient(rgba(0, 0, 0, 0.82), rgba(0, 0, 0, 0.92)), 
                        url('https://unsplash.com') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Kotak Konsol Panel Utama */
        .terminal-panel {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 550px;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #ff003c;
            box-shadow: 0 12px 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(255, 0, 60, 0.2);
            padding: 45px 30px;
            border-radius: 8px;
            text-align: center;
            backdrop-filter: blur(10px); /* Efek kaca buram premium di latar belakang */
        }

        /* Ornamen Garis Atas Windows */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 0, 60, 0.2);
            padding-bottom: 15px;
            margin-bottom: 35px;
        }

        .panel-dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background-color: #ff003c;
        }

        .dot:nth-child(2) { background-color: #ffaa00; }
        .dot:nth-child(3) { background-color: #00ff66; }

        .panel-title {
            color: #ff003c;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* JUDUL UTAMA GAYA CYBER BLACKHAT */
        h1 {
            margin: 0 0 10px 0;
            font-size: 38px;
            color: #ffffff;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        /* Sub-Judul Detail */
        .subtitle {
            font-size: 14px;
            color: #00ff66; /* Warna Hijau Terminal */
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 35px;
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.3);
        }

        /* Ornamen Bingkai Tengah */
        .center-hud {
            width: 100%;
            border: 1px dashed rgba(255, 0, 60, 0.3);
            background: rgba(0, 0, 0, 0.5);
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        /* Teks Berjalan/Animasi Simulasi Status Sistem */
        .status-text {
            font-size: 13px;
            color: #a3a3a3;
            line-height: 1.8;
            letter-spacing: 1px;
        }

        .highlight-green {
            color: #00ff66;
            font-weight: bold;
        }

        .highlight-red {
            color: #ff003c;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Panel Utama Halaman Tampilan RORAXBALI -->
    <div class="terminal-panel">
        <div class="panel-header">
            <div class="panel-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="panel-title">> GATEWAY_SECURE_MAIN</div>
        </div>

        <!-- Bagian Identitas/Nama Utama -->
        <h1>RORAXBALI</h1>
        <div class="subtitle">CYBER NETWORK SYSTEM</div>
        
        <!-- Ornamen Info Display Tengah -->
        <div class="center-hud">
            <div class="status-text">
                $ CONNECTION: <span class="highlight-green">SECURE</span><br>
                $ STATUS: <span class="highlight-green">ONLINE</span><br>
                $ ENCRYPTION: <span class="highlight-green">AES-256 ACTIVE</span><br>
                <span class="highlight-red">> ACCESS GRANTED <</span>
            </div>
        </div>
    </div>

</body>
</html>
