<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL ACCESS</title>
    <!-- Mengambil font khusus terminal komputer -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Latar belakang gelap khas Kali Linux / Ubuntu Server */
            background-color: #0f0f16;
            font-family: 'Fira Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        /* Jendela Terminal Kali Linux */
        .kali-terminal {
            width: 92%;
            max-width: 500px;
            background-color: #1c1c24;
            border: 1px solid #38384d;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        /* Batang Atas Window (Title Bar Kali Linux) */
        .terminal-header {
            background-color: #15151c;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            position: relative;
            border-bottom: 1px solid #282837;
        }

        /* Tiga tombol bulat kiri atas */
        .window-buttons {
            display: flex;
            gap: 7px;
        }

        .w-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #ff5f56; /* Merah close */
        }
        .w-btn.minimize { background-color: #ffbd2e; } /* Kuning */
        .w-btn.maximize { background-color: #27c93f; } /* Hijau */

        /* Judul di tengah title bar */
        .terminal-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: #8c8ca3;
            font-weight: bold;
        }

        /* Isi Dalam Terminal */
        .terminal-body {
            padding: 25px 20px;
        }

        /* Teks Prompt Prompt Kali ($ root@kali) */
        .prompt-line {
            color: #8c8ca3;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .user-tag {
            color: #3498db; /* Biru user */
            font-weight: bold;
        }

        .host-tag {
            color: #2ecc71; /* Hijau host */
            font-weight: bold;
        }

        /* Teks Perintah/Instruksi Utama */
        .instruction {
            font-size: 15px;
            color: #ffffff;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Kotak Tempat Tautan / Link Anda */
        .link-container {
            width: 100%;
            background-color: #0b0b0f;
            border: 1px solid #2d2d3d;
            border-radius: 6px;
            padding: 14px;
            font-size: 14px;
            color: #2ecc71; /* Warna hijau teks link agar menonjol */
            word-break: break-all;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Tombol Salin Gaya Minimalis Konsol */
        .btn-action {
            width: 100%;
            background-color: #34495e;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s ease;
            text-transform: uppercase;
        }

        .btn-action:hover {
            background-color: #2c3e50;
        }

        /* Notifikasi Sukses Kecil di Bawah */
        .toast {
            display: none;
            text-align: center;
            color: #2ecc71;
            font-size: 13px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- Struktur Utama Jendela Kali Linux -->
    <div class="kali-terminal">
        <!-- Bagian Header Window -->
        <div class="terminal-header">
            <div class="window-buttons">
                <div class="w-btn"></div>
                <div class="w-btn minimize"></div>
                <div class="w-btn maximize"></div>
            </div>
            <div class="terminal-title">roraxbali@terminal:~</div>
        </div>

        <!-- Bagian Dalam Konsol -->
        <div class="terminal-body">
            <!-- Penanda Baris Konsol -->
            <div class="prompt-line">
                <span class="user-tag">roraxbali</span>@<span class="host-tag">kali</span>:~$ system_init
            </div>

            <!-- Pesan Perintah Sesuai Permintaan Anda -->
            <div class="instruction">
                Silahkan salin link di bawah ini dan buka melalui browser Google Chrome atau Safari Anda untuk melanjutkan.
            </div>

            <!-- KOTAK LINK (Silakan ganti teks URL di bawah ini dengan link domain Anda) -->
            <div class="link-container" id="targetLink">https://link-domain-anda-disini.com</div>

            <!-- Tombol Salin -->
            <button class="btn-action" onclick="salinTautan()">Salin Link</button>

            <!-- Pesan Berhasil Salin -->
            <div class="toast" id="notifSukses">✓ Berhasil disalin! Silakan tempel di Chrome/Safari.</div>
        </div>
    </div>

    <script>
        function salinTautan() {
            const teksLink = document.getElementById('targetLink').innerText;
            const notif = document.getElementById('notifSukses');

            // Proses menyalin teks otomatis ke memori HP
            navigator.clipboard.writeText(teksLink).then(() => {
                notif.style.display = 'block';
                // Sembunyikan notifikasi setelah 4 detik
                setTimeout(() => {
                    notif.style.display = 'none';
                }, 4000);
            }).catch(err => {
                console.error('Gagal menyalin otomatis: ', err);
                alert('Gagal menyalin otomatis. Silakan tekan lama teks link hijau di atas untuk menyalin manual.');
            });
        }
    </script>
</body>
</html>
